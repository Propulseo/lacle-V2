<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 220" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;family=DM+Sans:wght@400;700&amp;display=swap');
  </style>
  <!-- Module Card -->
  <rect x="0.5" y="0.5" width="339" height="219" stroke="#2A2A2A" fill="rgba(19,19,19,0.4)"/>
  <!-- Background number -->
  <text x="280" y="80" text-anchor="end" font-family="'Cormorant Garamond', serif" font-size="80" font-weight="300" fill="rgba(245,240,235,0.03)">01</text>
  <!-- Label -->
  <text x="24" y="44" font-family="'DM Sans', sans-serif" font-size="10" font-weight="700" letter-spacing="0.2em" fill="rgba(176,141,87,0.6)">MODULE 01</text>
  <!-- Title -->
  <text x="24" y="90" font-family="'Cormorant Garamond', serif" font-size="22" fill="#F5F0EB">Les fondations de la PNL</text>
  <!-- Description -->
  <text x="24" y="120" font-family="'DM Sans', sans-serif" font-size="13" fill="rgba(160,154,147,0.8)">Origines, principes fondateurs et cadre</text>
  <text x="24" y="138" font-family="'DM Sans', sans-serif" font-size="13" fill="rgba(160,154,147,0.8)">épistémologique de la PNL.</text>
  <!-- Bottom accent line -->
  <line x1="24" y1="185" x2="56" y2="185" stroke="#2A2A2A" stroke-width="1"/>
</svg>
