<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;family=DM+Sans:wght@400;700&amp;display=swap');
  </style>
  <!-- Story Template 1080x1920 — Dark Background -->
  <rect width="1080" height="1920" fill="#0B0B0B"/>

  <!-- Aurora effect (static) -->
  <defs>
    <radialGradient id="s1" cx="70%" cy="20%" r="50%">
      <stop offset="0%" stop-color="rgb(20,50,120)" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="s2" cx="20%" cy="70%" r="45%">
      <stop offset="0%" stop-color="rgb(15,40,100)" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#s1)"/>
  <rect width="1080" height="1920" fill="url(#s2)"/>

  <!-- Key Symbol (center, large) -->
  <g stroke="#F5F0EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.15" transform="translate(460, 600) scale(3.5)">
    <circle cx="24" cy="18" r="14"/>
    <line x1="24" y1="32" x2="24" y2="100"/>
    <line x1="24" y1="78" x2="36" y2="78"/>
    <line x1="24" y1="92" x2="32" y2="92"/>
  </g>

  <!-- Brand name -->
  <text x="540" y="1200" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="72" font-weight="400" fill="#F5F0EB">La Clé</text>

  <!-- Tagline -->
  <text x="540" y="1270" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="18" letter-spacing="0.15em" fill="#A09A93">INSTITUT DE COMPRÉHENSION</text>
  <text x="540" y="1300" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="18" letter-spacing="0.15em" fill="#A09A93">DES MÉCANISMES HUMAINS</text>

  <!-- Content zone indicator -->
  <rect x="100" y="1400" width="880" height="320" stroke="#2A2A2A" stroke-dasharray="8 4" fill="none" opacity="0.3"/>
  <text x="540" y="1565" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="14" fill="#6B665F" letter-spacing="0.1em">ZONE DE CONTENU</text>
</svg>
