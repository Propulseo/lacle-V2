<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;family=DM+Sans:wght@400;700&amp;display=swap');
  </style>
  <!-- Post carré 1080x1080 — Template Instagram -->
  <rect width="1080" height="1080" fill="#0B0B0B"/>

  <!-- Aurora -->
  <defs>
    <radialGradient id="p1" cx="70%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgb(20,50,120)" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#p1)"/>

  <!-- Top label -->
  <text x="540" y="200" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="14" font-weight="700" letter-spacing="0.3em" fill="#B08D57">LA CLÉ — INSTITUT</text>

  <!-- Key Symbol watermark -->
  <g stroke="#F5F0EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.08" transform="translate(486, 250) scale(2.2)">
    <circle cx="24" cy="18" r="14"/>
    <line x1="24" y1="32" x2="24" y2="100"/>
    <line x1="24" y1="78" x2="36" y2="78"/>
    <line x1="24" y1="92" x2="32" y2="92"/>
  </g>

  <!-- Content zone -->
  <rect x="80" y="580" width="920" height="300" stroke="#2A2A2A" stroke-dasharray="8 4" fill="none" opacity="0.3"/>
  <text x="540" y="735" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="14" fill="#6B665F" letter-spacing="0.1em">ZONE DE CONTENU / CITATION</text>

  <!-- Bottom baseline -->
  <line x1="440" y1="960" x2="640" y2="960" stroke="#2A2A2A" stroke-width="1"/>
  <text x="540" y="1000" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="12" letter-spacing="0.15em" fill="#6B665F">COMPRENDRE AVANT D'AGIR</text>
</svg>
